volumes:
  redis_data:
  sql_data:
  qdrant_data:

networks:
  dbnet:
    driver: bridge
    external: true
  langfuse:
    driver: bridge
    external: true
  monitoring:
    driver: bridge
    external: true
  

services:
  redis:
    image: "redis/redis-stack-server:latest"
    container_name: redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - dbnet
    environment:
      - REDIS_ARGS=--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15
    container_name: postgres
    env_file:
      - .env
    volumes:
      - sql_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - dbnet
    restart: unless-stopped
    mem_limit: 512mb
    cpus: '0.5'
    shm_size: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    env_file:
      - .env
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - dbnet
    restart: unless-stopped
    mem_limit: 1gb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s


  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - dbnet
    depends_on:
      app: 
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - monitoring
    restart: unless-stopped
    mem_limit: 128mb
    mem_reservation: 64mb
    cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9100/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  alloy:
    image: grafana/alloy:v1.7.5
    container_name: alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data
      /etc/alloy/config.alloy
    networks:
      - monitoring
    restart: unless-stopped
    mem_limit: 256mb
    mem_reservation: 128mb
    cpus: '0.3'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:12345/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s